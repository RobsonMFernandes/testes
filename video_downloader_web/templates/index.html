<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Downloader de Vídeos</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f6f8;
      }
      .container {
        max-width: 700px;
        margin: 40px auto;
        background: #fff;
        padding: 24px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin-top: 0;
      }
      form {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      input[type='url'] {
        flex: 1;
        min-width: 250px;
        padding: 10px;
      }
      button {
        background: #0069d9;
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 10px 16px;
        cursor: pointer;
      }
      .msg {
        margin-top: 16px;
        padding: 10px;
        border-radius: 4px;
      }
      .error {
        background: #ffe3e3;
        color: #a61e4d;
      }
      .success {
        background: #d3f9d8;
        color: #2b8a3e;
      }
      .hint {
        margin-top: 16px;
        color: #495057;
      }
      .access-link {
        margin-top: 14px;
        background: #eef7ff;
        border-left: 4px solid #1c7ed6;
        padding: 10px 12px;
        border-radius: 4px;
      }
      .access-link code {
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Baixar vídeo por link</h1>
      <form method="post" action="/download">
        <input
          type="url"
          name="video_url"
          placeholder="Cole aqui o link da página do vídeo"
          value="{{ video_url or '' }}"
          required
        />
        <button type="submit">Baixar</button>
      </form>

      <div class="access-link">
        <strong>Link de acesso ao aplicativo:</strong>
        <code>{{ access_link }}</code>
      </div>

      {% if error %}
      <div class="msg error">{{ error }}</div>
      {% endif %}

      {% if success %}
      <div class="msg success">{{ success }}</div>
      {% endif %}

      <p class="hint">
        Use apenas conteúdo que você tenha direito de baixar.
      </p>
    </div>
  </body>
</html>
